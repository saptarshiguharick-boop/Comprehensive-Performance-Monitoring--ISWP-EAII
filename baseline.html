<table id="baselineTable">
<thead>
<tr><th>District</th><th>Planned</th><th>Achieved</th><th>% Completion</th><th>Cumulative</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('data/data.json')
  .then(r => r.json())
  .then(data => {
    const rows = data.baseline_districts.map(item => `
      <tr>
        <td>${item.district}</td>
        <td>${item.planned}</td>
        <td>${item.achieved}</td>
        <td>${item.percent}%</td>
        <td>${item.cumulative}</td>
      </tr>
    `).join('');
    document.querySelector("#baselineTable tbody").innerHTML = rows;
  });
</script>
