<h2>Field Progress Summary</h2>
<table id="overallTable">
<thead>
<tr><th>Component</th><th>Cumulative Progress</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('data/data.json')
  .then(response => response.json())
  .then(data => {
    const rows = data.overall_progress.map(item => `
      <tr>
        <td>${item.component}</td>
        <td>${item.planned}</td>
        <td>${item.achieved}</td>
        <td>${item.percent}%</td>
        <td>${item.cumulative}</td>
      </tr>
    `).join('');
    document.querySelector("#overallTable tbody").innerHTML = rows;
  });
</script>
``
